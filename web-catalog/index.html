<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIY Woodworking Project Catalog - Montreal</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <i class="fas fa-hammer"></i>
                    <h1>Woodworking Pro</h1>
                </div>
                <nav class="nav">
                    <button class="nav-btn active" data-view="grid">
                        <i class="fas fa-th-large"></i> Grid
                    </button>
                    <button class="nav-btn" data-view="list">
                        <i class="fas fa-list"></i> List
                    </button>
                    <button class="nav-btn" id="stats-btn">
                        <i class="fas fa-chart-bar"></i> Stats
                    </button>
                </nav>
            </div>
        </header>

        <!-- Sidebar Filters -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h3><i class="fas fa-filter"></i> Filters</h3>
                <button class="clear-filters" id="clear-filters">
                    <i class="fas fa-undo"></i> Clear
                </button>
            </div>

            <!-- Location Filter -->
            <div class="filter-section">
                <h4><i class="fas fa-map-marker-alt"></i> Location</h4>
                <div class="location-inputs">
                    <input type="text" id="postal-code" placeholder="Postal Code (e.g., H3A 0G4)" maxlength="7">
                    <div class="radius-slider">
                        <label>Radius: <span id="radius-value">25</span> km</label>
                        <input type="range" id="radius" min="5" max="100" value="25">
                    </div>
                    <button class="location-btn" id="apply-location">
                        <i class="fas fa-search-location"></i> Apply
                    </button>
                </div>
            </div>

            <!-- Category Filter -->
            <div class="filter-section">
                <h4><i class="fas fa-folder"></i> Category</h4>
                <div class="checkbox-group" id="category-filters"></div>
            </div>

            <!-- Difficulty Filter -->
            <div class="filter-section">
                <h4><i class="fas fa-layer-group"></i> Difficulty</h4>
                <div class="checkbox-group" id="difficulty-filters">
                    <label class="checkbox">
                        <input type="checkbox" value="Easy" checked>
                        <span class="checkmark easy"></span>
                        <span>Easy</span>
                    </label>
                    <label class="checkbox">
                        <input type="checkbox" value="Intermediate" checked>
                        <span class="checkmark intermediate"></span>
                        <span>Intermediate</span>
                    </label>
                    <label class="checkbox">
                        <input type="checkbox" value="Expert" checked>
                        <span class="checkmark expert"></span>
                        <span>Expert</span>
                    </label>
                </div>
            </div>

            <!-- Profit Range Filter -->
            <div class="filter-section">
                <h4><i class="fas fa-dollar-sign"></i> Profit Range</h4>
                <div class="checkbox-group" id="profit-filters">
                    <label class="checkbox">
                        <input type="checkbox" value="$50-$100" checked>
                        <span class="checkmark"></span>
                        <span>$50-$100</span>
                    </label>
                    <label class="checkbox">
                        <input type="checkbox" value="$100-$200" checked>
                        <span class="checkmark"></span>
                        <span>$100-$200</span>
                    </label>
                    <label class="checkbox">
                        <input type="checkbox" value="$200-$500" checked>
                        <span class="checkmark"></span>
                        <span>$200-$500</span>
                    </label>
                    <label class="checkbox">
                        <input type="checkbox" value="$500+" checked>
                        <span class="checkmark"></span>
                        <span>$500+</span>
                    </label>
                </div>
            </div>

            <!-- Time Filter -->
            <div class="filter-section">
                <h4><i class="fas fa-clock"></i> Time Required</h4>
                <div class="range-inputs">
                    <input type="number" id="min-hours" placeholder="Min hours" min="0">
                    <span>to</span>
                    <input type="number" id="max-hours" placeholder="Max hours" min="0">
                </div>
            </div>

            <!-- Tools Filter -->
            <div class="filter-section">
                <h4><i class="fas fa-tools"></i> Tools Required</h4>
                <div class="checkbox-group" id="tools-filters"></div>
            </div>

            <!-- Search -->
            <div class="filter-section">
                <h4><i class="fas fa-search"></i> Search</h4>
                <input type="text" id="search-input" placeholder="Project name, source...">
            </div>

            <!-- Active Filters -->
            <div class="active-filters" id="active-filters"></div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Stats Bar -->
            <div class="stats-bar" id="stats-bar">
                <div class="stat">
                    <span class="stat-value" id="total-projects">0</span>
                    <span class="stat-label">Projects</span>
                </div>
                <div class="stat">
                    <span class="stat-value" id="total-profit">$0</span>
                    <span class="stat-label">Potential Profit</span>
                </div>
                <div class="stat">
                    <span class="stat-value" id="total-hours">0</span>
                    <span class="stat-label">Total Hours</span>
                </div>
                <div class="stat">
                    <span class="stat-value" id="avg-roi">0%</span>
                    <span class="stat-label">Avg ROI</span>
                </div>
            </div>

            <!-- Sort Controls -->
            <div class="sort-controls">
                <label>Sort by:</label>
                <select id="sort-select">
                    <option value="profit-desc">Profit (High to Low)</option>
                    <option value="profit-asc">Profit (Low to High)</option>
                    <option value="hours-asc">Time (Shortest)</option>
                    <option value="hours-desc">Time (Longest)</option>
                    <option value="roi-desc">ROI (Best)</option>
                    <option value="difficulty">Difficulty</option>
                </select>
            </div>

            <!-- Projects Grid -->
            <div class="projects-container" id="projects-container">
                <!-- Projects will be rendered here -->
            </div>
        </main>

        <!-- PDF Viewer Modal -->
        <div class="modal" id="pdf-modal">
            <div class="modal-overlay"></div>
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="modal-title">Project Title</h2>
                    <button class="close-modal" id="close-pdf-modal">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="modal-body">
                    <div class="pdf-viewer-container">
                        <embed id="pdf-viewer" src="" type="application/pdf" width="100%" height="100%">
                    </div>
                </div>
            </div>
        </div>

        <!-- Project Detail Modal -->
        <div class="modal" id="detail-modal">
            <div class="modal-overlay"></div>
            <div class="modal-content detail-modal-content">
                <div class="modal-header">
                    <h2 id="detail-title">Project Details</h2>
                    <button class="close-modal" id="close-detail-modal">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="modal-body detail-body" id="detail-content">
                    <!-- Detail content will be rendered here -->
                </div>
            </div>
        </div>

        <!-- Compare Modal -->
        <div class="modal" id="compare-modal">
            <div class="modal-overlay"></div>
            <div class="modal-content compare-modal-content">
                <div class="modal-header">
                    <h2>Compare Projects</h2>
                    <button class="close-modal" id="close-compare-modal">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="modal-body" id="compare-content">
                    <!-- Comparison content will be rendered here -->
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
